<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hydroponics Mood Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Coiny&family=Fredoka:wght@300..700&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Quicksand:wght@300..700&family=Shrikhand&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ---------------------------------------------------------- -->
    <!-- Hydroponic Definition -->
    <section id="definition">
      <div class="top-bar"></div>
      <div class="definition-circles-container">
        <div class="top-left-circle"></div>
        <div class="top-left-circle-inner"></div>
        <div class="top-left-circle-support"></div>
        <div class="top-left-circle-support-inner"></div>
        <div class="top-right-circle"></div>

        <div class="definition-circle-1"></div>
        <div class="definition-circle-2"></div>
        <div class="definition-circle-3"></div>

        <div class="rightmost-circle"></div>
        <div class="rightmost-circle-inner"></div>
      </div>

      <div class="container d-flex justify-content-center align-items-center">
        <div class="definition-card">
          <h1>Hydroponic</h1>
          <p class="quicksand">
            : the growing of plants in nutrient solutions with or without an
            inert medium (such as soil) to provide mechanical support.
          </p>
        </div>
      </div>
    </section>

    <!-- ---------------------------------------------------------- -->
    <!-- Hydroponic Definition -->
    <section id="quotes">
      <div class="container"></div>
    </section>

    <!-- ---------------------------------------------------------- -->
    <!-- Hydroponic Definition -->
    <section id="explore">
      <div class="container"></div>
    </section>

    <!-- ---------------------------------------------------------- -->
    <!-- Hydroponic Definition -->
    <section id="palette">
      <div class="container"></div>
    </section>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
